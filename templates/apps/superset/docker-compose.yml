services:
  superset:
    image: apache/superset:latest
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${ATMOSPHERE_APP}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${ATMOSPHERE_APP}.entrypoints=websecure"
      - "traefik.http.routers.${ATMOSPHERE_APP}.tls=true"
      - "traefik.http.routers.${ATMOSPHERE_APP}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${ATMOSPHERE_APP}.loadbalancer.server.port=8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    command: ["/bin/sh", "-c", "superset db upgrade && superset init && /usr/bin/run-server.sh"]
    volumes:
      - superset_home:/app/superset_home
    networks:
      - default
      - traefik

volumes:
  superset_home:

networks:
  default:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
