# Traefik Static Configuration

# API and Dashboard
api:
  dashboard: false
  insecure: false

# Entry Points
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik
    watch: true

# Certificate Resolvers
certificatesResolvers:
  letsencrypt:
    acme:
      email: karol_kassovic@yahoo.com
      storage: /acme/acme.json
      httpChallenge:
        entryPoint: web

# Logs
log:
  level: INFO

accessLog: {}
